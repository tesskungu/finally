<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Fabric pattern squares -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Top row -->
    <rect x="25" y="20" width="12" height="12" rx="1"/>
    <rect x="42" y="20" width="12" height="12" rx="1"/>
    <rect x="59" y="20" width="12" height="12" rx="1"/>
    
    <!-- Middle row -->
    <rect x="25" y="40" width="12" height="12" rx="1"/>
    <rect x="42" y="40" width="12" height="12" rx="1"/>
    <rect x="59" y="40" width="12" height="12" rx="1"/>
    
    <!-- Bottom row -->
    <rect x="25" y="60" width="12" height="12" rx="1"/>
    <rect x="42" y="60" width="12" height="12" rx="1"/>
    <rect x="59" y="60" width="12" height="12" rx="1"/>
  </g>
  
  <!-- Letter F -->
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">F</text>
</svg>
